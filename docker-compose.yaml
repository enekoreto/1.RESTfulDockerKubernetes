services:
  student_service:
    image: enekoreto/student_service:latest
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017
    ports:
      - "8080:8080"

  mongo:
    image: mongo:4.4
    restart: unless-stopped
    ports:
      - "27017:27017"